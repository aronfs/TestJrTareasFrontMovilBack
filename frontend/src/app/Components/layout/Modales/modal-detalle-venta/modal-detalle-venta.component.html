<mat-card>
    <mat-card-title class="text-center">Detalles de la Venta</mat-card-title>
    <mat-divider style="margin-top: 10px;"></mat-divider>
  
    <mat-card-content>
        <mat-divider style="margin: 10px 0;"></mat-divider>

  <div style="padding-top: 10px;">
    <div class="grid-container">
      <mat-form-field appearance="outline">
        <mat-label>Fecha Registro</mat-label>
        <input matInput [value]="fechaRegistro" readonly>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Número de Venta</mat-label>
        <input matInput [value]="numeroDocumento" readonly>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Tipo de Pago</mat-label>
        <input matInput [value]="tipoPago" readonly>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Total</mat-label>
        <input matInput [value]="total" readonly>
      </mat-form-field>
    </div>
  </div>
  
      <!-- Tabla de Detalles -->
      <mat-card class="mt-3" style="margin-top: 20px;">
        <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">
          <ng-container matColumnDef="descripcionProducto">
            <th mat-header-cell *matHeaderCellDef> Producto </th>
            <td mat-cell *matCellDef="let element"> {{ element.descripcionProducto }} </td>
          </ng-container>
  
          <ng-container matColumnDef="cantidad">
            <th mat-header-cell *matHeaderCellDef> Cantidad </th>
            <td mat-cell *matCellDef="let element"> {{ element.cantidad }} </td>
          </ng-container>
  
          <ng-container matColumnDef="precioTexto">
            <th mat-header-cell *matHeaderCellDef> Precio </th>
            <td mat-cell *matCellDef="let element"> {{ element.precioTexto }} </td>
          </ng-container>
  
          <ng-container matColumnDef="totalTexto">
            <th mat-header-cell *matHeaderCellDef> Total </th>
            <td mat-cell *matCellDef="let element"> {{ element.totalTexto }} </td>
          </ng-container>
  
          <tr mat-header-row *matHeaderRowDef="columnasTabla"></tr>
          <tr mat-row *matRowDef="let row; columns: columnasTabla;"></tr>
        </table>
      </mat-card>
  
      <!-- Botón para volver -->
      <div class="text-center" style="margin-top: 20px;">
        <button mat-button color="primary" mat-dialog-close>
          Volver
        </button>
      </div>
    </mat-card-content>
  </mat-card>
