<h1 style="margin: 20px 0px 0px 4px">Nueva Venta</h1>

<mat-card style="margin: 20px 40px 40px 40px; padding: 20px;">
    <mat-card-content>
        <form [formGroup]="formularioProductoVenta" (ngSubmit)="agregarProductoParaVenta()">
            <mat-grid-list cols="4" rowHeight="80px" gutterSize="16px">
                <mat-grid-tile [colspan]="2">
                    <mat-form-field class="full-width" appearance="fill">
                        <mat-label>Producto</mat-label>
                        <input matInput type="text" placeholder="Buscar..." [matAutocomplete]="auto" formControlName="producto">
                        <mat-autocomplete autoActiveFirstOption #auto="matAutocomplete"
                            (optionSelected)="productoParaVenta($event)" [displayWith]="mostrarProducto">
                            <mat-option *ngFor="let option of listaProductosFiltro" [value]="option">
                                {{option.nombre}}
                            </mat-option>
                        </mat-autocomplete>
                    </mat-form-field>
                </mat-grid-tile>

                <mat-grid-tile>
                    <mat-form-field class="full-width" appearance="fill">
                        <mat-label>Cantidad</mat-label>
                        <input matInput type="number" formControlName="cantidad">
                    </mat-form-field>
                </mat-grid-tile>

                <mat-grid-tile>
                    <button mat-raised-button color="primary" class="btn-agregar"
                        [disabled]="formularioProductoVenta.invalid">
                        <mat-icon>add</mat-icon> Agregar
                    </button>
                </mat-grid-tile>
            </mat-grid-list>
        </form>

        <mat-grid-list cols="2" rowHeight="80px">
            <mat-grid-tile>
                <mat-form-field class="full-width" appearance="fill">
                    <mat-label>Tipo de Pago</mat-label>
                    <mat-select [(value)]="tipodePagoPorDefecto">
                        <mat-option value="Efectivo">Efectivo</mat-option>
                        <mat-option value="Tarjeta">Tarjeta</mat-option>
                    </mat-select>
                </mat-form-field>
            </mat-grid-tile>

            <mat-grid-tile>
                <button mat-raised-button color="accent" class="btn-total">
                    Total: {{totalPagar.toFixed(2)}}
                </button>
            </mat-grid-tile>
        </mat-grid-list>

        <div class="tabla-container">
            <table mat-table [dataSource]="datosDetalleVenta" class="custom-table mat-elevation-z8">

                <!-- Producto -->
                <ng-container matColumnDef="producto">
                    <th mat-header-cell *matHeaderCellDef>Producto</th>
                    <td mat-cell *matCellDef="let element">{{element.descripcionProducto}}</td>
                </ng-container>

                <!-- Cantidad -->
                <ng-container matColumnDef="cantidad">
                    <th mat-header-cell *matHeaderCellDef>Cantidad</th>
                    <td mat-cell *matCellDef="let element">{{element.cantidad}}</td>
                </ng-container>

                <!-- Precio -->
                <ng-container matColumnDef="precio">
                    <th mat-header-cell *matHeaderCellDef>Precio</th>
                    <td mat-cell *matCellDef="let element">{{element.precioTexto}}</td>
                </ng-container>

                <!-- Total -->
                <ng-container matColumnDef="total">
                    <th mat-header-cell *matHeaderCellDef>Total</th>
                    <td mat-cell *matCellDef="let element">{{element.totalTexto}}</td>
                </ng-container>

                <!-- Acciones -->
                <ng-container matColumnDef="accion">
                    <th mat-header-cell *matHeaderCellDef style="width: 120px;">Acciones</th>
                    <td mat-cell *matCellDef="let element">
                        <button mat-icon-button color="warn" (click)="eliminarProducto(element)">
                            <mat-icon>delete</mat-icon>
                        </button>
                    </td>
                </ng-container>

                <tr mat-header-row *matHeaderRowDef="columnasTabla"></tr>
                <tr mat-row *matRowDef="let row; columns: columnasTabla"></tr>
            </table>
        </div>

        <!-- Sección para el botón "Registrar" alineado correctamente -->
        <mat-grid-list cols="4" rowHeight="80px" style="margin-top: 20px;">
            <mat-grid-tile [colspan]="3"></mat-grid-tile>
            <mat-grid-tile>
                <button mat-raised-button color="primary" style="width: 100%;"
                    [disabled]="listaProductosParaVenta.length < 1 || bloquearBotonRegistrar"
                    (click)="registrarVenta()">
                    <mat-icon>new_label</mat-icon> Registrar
                </button>
            </mat-grid-tile>
        </mat-grid-list>

    </mat-card-content>
</mat-card>
